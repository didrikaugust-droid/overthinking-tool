<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Overthinker Tool</title>
  <link rel="stylesheet" href="style.css"/>
</head>

<body>

<!-- NAV -->
<nav class="nav">
  <div class="logo">🧠 Overthinker Tool</div>
  <div class="nav-links">
    <a href="#">Hjem</a>
    <a href="#">Om</a>
    <a href="#">Tips</a>
    <button class="mode">🌙 Mørk modus</button>
  </div>
</nav>

<!-- HERO -->
<section class="hero">

  <div class="hero-left">
    <h1>Stopp overtenkingen.</h1>
    <h2>Få klarhet på sekunder.</h2>

    <p>
      Skriv hva du overtenker, så gir vi deg ulike perspektiver
      som hjelper deg å se det klarere.
    </p>

    <div class="inputBox">
      <textarea id="input" maxlength="300" placeholder="Skriv hva du overtenker..."></textarea>
      <button onclick="analyze()">Analyser ✨</button>
    </div>

    <div class="badges">
      <div>🔒 100% anonymt</div>
      <div>✨ Flere perspektiver</div>
      <div>⚡ Raskt og enkelt</div>
    </div>
  </div>

  <div class="hero-right">
    <img src="https://cdn-icons-png.flaticon.com/512/4712/4712027.png"/>
  </div>

</section>

<!-- RESULT -->
<section id="results" class="results"></section>

<script src="script.js"></script>
</body>
</html>
