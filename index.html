<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Overthinker</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="bg"></div>

<div class="app">

<!-- TOP -->
<header>
  <div class="logo">🧠 Overthinker</div>
  <div class="nav">
    <button onclick="go('home')">Home</button>
    <button onclick="go('tips')">Tips</button>
  </div>
</header>

<!-- HOME -->
<section id="home" class="page active">

  <div class="hero">

    <div class="left">
      <h1>Stop overthinking.<br><span>Get clarity instantly.</span></h1>

      <p>Type your thoughts and get instant perspective.</p>

      <div class="box">
        <textarea id="input" placeholder="What are you overthinking?"></textarea>

        <div class="row">
          <span id="counter">0 / 300</span>
          <button onclick="analyze()">Analyze ✨</button>
        </div>
      </div>

      <div class="tags">
        <span>Anonymous</span>
        <span>Instant</span>
        <span>Clarity</span>
      </div>
    </div>

    <div class="orb"></div>

  </div>

</section>

<!-- RESULT -->
<section id="result" class="page">

  <button class="back" onclick="go('home')">← Back</button>

  <div class="card big">
    <h2>Overthinking Level</h2>
    <h1 id="percent">0%</h1>
    <div class="bar"><div id="fill"></div></div>
  </div>

  <div id="results" class="grid"></div>

</section>

<!-- TIPS -->
<section id="tips" class="page">

  <h2>Calm Mind Tips</h2>

  <div class="grid">
    <div class="card">Focus on what you can control</div>
    <div class="card">Write thoughts down</div>
    <div class="card">Slow breathing</div>
    <div class="card">Talk to someone</div>
  </div>

</section>

</div>

<script src="script.js"></script>
</body>
</html>
